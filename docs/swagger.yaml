swagger: '2.0'
info:
  title: "Video App API"
  description: "ビデオ管理アプリケーションのREST API"
  version: "1.0.0"
  contact:
    name: "API Support"
host: localhost:8000
basePath: /
schemes:
  - http
paths:
  /api/v1/videos:
    get:
      summary: "ビデオ一覧を取得"
      description: "ページネーション対応のビデオ一覧を取得します"
      tags:
        - "Videos"
      parameters:
        - name: "ids"
          in: "query"
          description: "ビデオID（複数指定可能）"
          required: false
          type: "array"
          items:
            type: "integer"
          collectionFormat: "multi"
        - name: "filterBy"
          in: "query"
          description: "フィルター"
          required: false
          type: "string"
        - name: "page"
          in: "query"
          description: "ページ番号"
          required: false
          type: "integer"
          default: 1
          minimum: 1
        - name: "limit"
          in: "query"
          description: "1ページあたりのアイテム数"
          required: false
          type: "integer"
          default: 20
          minimum: 1
          maximum: 100
        - name: "sort"
          in: "query"
          description: "ソート対象フィールド"
          required: false
          type: "string"
          enum:
            - "created_at"
            - "views"
            - "file_name"
            - "duration"
          default: "created_at"
        - name: "order"
          in: "query"
          description: "ソート順序"
          required: false
          type: "string"
          enum:
            - "asc"
            - "desc"
          default: "desc"
      responses:
        200:
          description: "成功"
          schema:
            $ref: "#/definitions/VideoListResponse"
        422:
          description: "バリデーションエラー"
          schema:
            $ref: "#/definitions/Error"
        500:
          description: "サーバーエラー"
          schema:
            $ref: "#/definitions/Error"
  /api/v1/videos/search:
    get:
      summary: "ビデオを検索"
      description: "キーワードでビデオを検索します"
      tags:
        - "Videos"
      parameters:
        - name: "q"
          in: "query"
          description: "検索キーワード"
          required: true
          type: "string"
          minLength: 1
        - name: "page"
          in: "query"
          description: "ページ番号"
          required: false
          type: "integer"
          default: 1
          minimum: 1
        - name: "limit"
          in: "query"
          description: "1ページあたりのアイテム数"
          required: false
          type: "integer"
          default: 20
          minimum: 1
          maximum: 100
        - name: "order"
          in: "query"
          description: "ソート順序"
          required: false
          type: "string"
          enum:
            - "asc"
            - "desc"
          default: "desc"
        - name: "filterBy"
          in: "query"
          description: "フィルター"
          required: false
          type: "string"
      responses:
        200:
          description: "成功"
          schema:
            $ref: "#/definitions/VideoListResponse"
        400:
          description: "リクエストエラー"
          schema:
            $ref: "#/definitions/Error"
        500:
          description: "サーバーエラー"
          schema:
            $ref: "#/definitions/Error"
  /api/v1/videos/{id}:
    get:
      summary: "ビデオ詳細を取得"
      description: "特定のビデオの詳細情報を取得します"
      tags:
        - "Videos"
      parameters:
        - name: "id"
          in: "path"
          description: "ビデオID"
          required: true
          type: "integer"
          minimum: 1
      responses:
        200:
          description: "成功"
          schema:
            $ref: "#/definitions/VideoResponse"
        404:
          description: "ビデオが見つかりません"
          schema:
            $ref: "#/definitions/Error"
        500:
          description: "サーバーエラー"
          schema:
            $ref: "#/definitions/Error"
  /api/v1/videos/{id}/download:
    get:
      summary: "ビデオをダウンロード"
      description: "ビデオファイルをダウンロードします"
      tags:
        - "Videos"
      parameters:
        - name: "id"
          in: "path"
          description: "ビデオID"
          required: true
          type: "integer"
          minimum: 1
      responses:
        200:
          description: "成功"
          schema:
            type: "file"
        404:
          description: "ビデオが見つかりません"
        500:
          description: "サーバーエラー"
  /api/v1/videos/{id}/thumbnail/regenerate:
    post:
      summary: "サムネイルを再生成"
      description: "ビデオのサムネイルを再生成します"
      tags:
        - "Videos"
      parameters:
        - name: "id"
          in: "path"
          description: "ビデオID"
          required: true
          type: "integer"
          minimum: 1
        - name: "body"
          in: "body"
          required: false
          schema:
            $ref: "#/definitions/ThumbnailRegenerateRequest"
      responses:
        200:
          description: "成功"
          schema:
            $ref: "#/definitions/ThumbnailRegenerateResponse"
        404:
          description: "ビデオが見つかりません"
          schema:
            $ref: "#/definitions/Error"
        500:
          description: "サーバーエラー"
          schema:
            $ref: "#/definitions/Error"
  /api/v1/captures:
    get:
      summary: "キャプチャ一覧を取得"
      description: "キャプチャ一覧をページネーション付きで取得します"
      tags:
        - "Captures"
      parameters:
        - name: "video_id"
          in: "query"
          description: "ビデオID（フィルタリング用）"
          required: false
          type: "integer"
          minimum: 1
        - name: "page"
          in: "query"
          description: "ページ番号"
          required: false
          type: "integer"
          default: 1
          minimum: 1
        - name: "limit"
          in: "query"
          description: "1ページあたりのアイテム数"
          required: false
          type: "integer"
          default: 20
          minimum: 1
          maximum: 100
      responses:
        200:
          description: "成功"
          schema:
            $ref: "#/definitions/CaptureListResponse"
        500:
          description: "サーバーエラー"
          schema:
            $ref: "#/definitions/Error"
    post:
      summary: "キャプチャを作成"
      description: "新しいキャプチャを作成します"
      tags:
        - "Captures"
      consumes:
        - "multipart/form-data"
      parameters:
        - name: "file"
          in: "formData"
          description: "キャプチャファイル"
          required: true
          type: "file"
        - name: "video_id"
          in: "formData"
          description: "ビデオID"
          required: true
          type: "integer"
          minimum: 1
      responses:
        201:
          description: "作成成功"
          schema:
            $ref: "#/definitions/Capture"
        400:
          description: "リクエストエラー"
          schema:
            $ref: "#/definitions/Error"
        404:
          description: "ビデオが見つかりません"
          schema:
            $ref: "#/definitions/Error"
        500:
          description: "サーバーエラー"
          schema:
            $ref: "#/definitions/Error"
definitions:
  ApiComment:
    type: "object"
    properties:
      time:
        type: "number"
        description: "コメント時刻（秒）"
      type:
        type: "string"
        description: "コメント表示位置"
        enum:
          - "right"
          - "top"
          - "bottom"
      size:
        type: "string"
        description: "コメントサイズ"
        enum:
          - "big"
          - "medium"
          - "small"
      color:
        type: "string"
        description: "コメント色"
      author:
        type: "string"
        description: "コメント作成者"
      text:
        type: "string"
        description: "コメント本文"
    required:
      - "time"
      - "type"
      - "size"
      - "color"
      - "text"
  VideoResponse:
    type: "object"
    properties:
      is_success:
        type: "boolean"
        description: "リクエスト成功フラグ"
      src:
        type: "string"
        description: "ビデオソース（URL）"
      title:
        type: "string"
        description: "ビデオタイトル"
      description:
        type: "string"
        description: "ビデオ説明"
      comments:
        type: "array"
        items:
          $ref: "#/definitions/ApiComment"
        description: "弾幕コメント一覧"
    required:
      - "is_success"
      - "src"
      - "comments"
  Video:
    type: "object"
    properties:
      id:
        type: "integer"
        description: "ビデオID"
      file_name:
        type: "string"
        description: "ファイル名"
      status:
        type: "string"
        description: "ビデオステータス"
        enum:
          - "ready"
          - "processing"
          - "error"
      file_size:
        type: "integer"
        description: "ファイルサイズ（バイト）"
      jikkyo_comment_count:
        type: "integer"
        description: "実況コメント数"
      jikkyo_date:
        type: "string"
        format: "date-time"
        description: "実況日時"
      views:
        type: "integer"
        description: "閲覧数"
      liked:
        type: "boolean"
        description: "お気に入りフラグ"
      duration:
        type: "number"
        format: "double"
        description: "動画長（秒）"
      created_at:
        type: "string"
        format: "date-time"
        description: "作成日時"
      updated_at:
        type: "string"
        format: "date-time"
        description: "更新日時"
      thumbnail_info:
        $ref: "#/definitions/ThumbnailInfo"
    required:
      - "id"
      - "file_name"
      - "file_size"
      - "views"
      - "liked"
      - "duration"
      - "created_at"
      - "updated_at"
  ThumbnailInfo:
    type: "object"
    properties:
      width:
        type: "integer"
        description: "サムネイル幅"
      height:
        type: "integer"
        description: "サムネイル高さ"
      generated_at:
        type: "string"
        format: "date-time"
        description: "生成日時"
  VideoListResponse:
    type: "object"
    properties:
      data:
        type: "array"
        items:
          $ref: "#/definitions/Video"
      pagination:
        $ref: "#/definitions/Pagination"
    required:
      - "data"
      - "pagination"
  Capture:
    type: "object"
    properties:
      id:
        type: "integer"
        description: "キャプチャID"
      filename:
        type: "string"
        description: "ファイル名"
      created_at:
        type: "string"
        format: "date-time"
        description: "作成日時"
      video_id:
        type: "integer"
        description: "ビデオID（外部キー）"
    required:
      - "id"
      - "filename"
      - "created_at"
      - "video_id"
  CaptureListResponse:
    type: "object"
    properties:
      data:
        type: "array"
        items:
          $ref: "#/definitions/Capture"
      pagination:
        $ref: "#/definitions/Pagination"
    required:
      - "data"
      - "pagination"
  ThumbnailRegenerateRequest:
    type: "object"
    properties:
      width:
        type: "integer"
        description: "サムネイル幅"
        minimum: 1
      height:
        type: "integer"
        description: "サムネイル高さ"
        minimum: 1
      timestamp:
        type: "number"
        description: "抽出タイムスタンプ（秒）"
        minimum: 0
  ThumbnailRegenerateResponse:
    type: "object"
    properties:
      id:
        type: "integer"
        description: "ビデオID"
      thumbnail_info:
        $ref: "#/definitions/ThumbnailInfo"
      message:
        type: "string"
        description: "ステータスメッセージ"
    required:
      - "id"
      - "thumbnail_info"
      - "message"
  Pagination:
    type: "object"
    properties:
      page:
        type: "integer"
        description: "現在のページ番号"
      limit:
        type: "integer"
        description: "1ページあたりのアイテム数"
      total:
        type: "integer"
        description: "総アイテム数"
      total_pages:
        type: "integer"
        description: "総ページ数"
    required:
      - "page"
      - "limit"
      - "total"
      - "total_pages"
  Error:
    type: "object"
    properties:
      error:
        type: "string"
        description: "エラーメッセージ"
      code:
        type: "string"
        description: "エラーコード"
    required:
      - "error"
