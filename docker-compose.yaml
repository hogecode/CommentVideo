version: '3.9'

services:
  # フロントエンド - Vite ホットリロード開発サーバー
  frontend:
    image: node:20-alpine
    container_name: commeplayer-frontend
    ports:
      - "3000:3000"    # Vite Dev Server
      - "5173:5173"    # Vite HMR
    environment:
      - NODE_ENV=development
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    working_dir: /app
    networks:
      - commeplayer-network
    restart: unless-stopped
    command: sh -c "yarn install --frozen-lockfile && yarn dev"

  # バックエンド - Go ホットリロード開発サーバー
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    container_name: commeplayer-backend
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - CGO_ENABLED=1
    volumes:
      - ./server:/app
      - go-modules:/go/pkg/mod
    working_dir: /app
    networks:
      - commeplayer-network
    restart: unless-stopped
    command: sh -c "go mod download && go install github.com/air-verse/air@latest && air"

  # Caddy リバースプロキシ
  caddy:
    image: caddy:latest
    container_name: commeplayer-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - ACME_AGREE=true
    depends_on:
      - frontend
      - backend
    networks:
      - commeplayer-network
    restart: unless-stopped

volumes:
  go-modules:
  caddy_data:
  caddy_config:

networks:
  commeplayer-network:
    driver: bridge
