version: '3.9'

services:
  # フロントエンド - 本番用（静的配信）
  frontend:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: commeplayer-frontend
    networks:
      - commeplayer-network
    restart: unless-stopped

  # バックエンド - 本番用（Go バイナリ実行）
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: commeplayer-backend
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - APP_ENV=prod
    networks:
      - commeplayer-network
    restart: unless-stopped
    command: "./generated serve"

  # Caddy リバースプロキシ
  caddy:
    image: caddy:latest
    container_name: commeplayer-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - ACME_AGREE=true
    depends_on:
      - frontend
      - backend
    networks:
      - commeplayer-network
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:

networks:
  commeplayer-network:
    driver: bridge
