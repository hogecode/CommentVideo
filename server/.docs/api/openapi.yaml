openapi: 3.0.1
info:
  contact:
    name: API Support
  description: ビデオ管理アプリケーションのREST API
  title: Video App API
  version: 1.0.0
servers:
- url: http://localhost:8000/
paths:
  /api/v1/videos:
    get:
      description: ページネーション対応のビデオ一覧を取得します
      parameters:
      - description: ビデオID（複数指定可能）
        explode: true
        in: query
        name: ids
        schema:
          items:
            type: integer
          type: array
        style: form
      - description: フィルター
        in: query
        name: filterBy
        schema:
          type: string
      - description: ページ番号
        in: query
        name: page
        schema:
          default: 1
          minimum: 1
          type: integer
      - description: 1ページあたりのアイテム数
        in: query
        name: limit
        schema:
          default: 20
          maximum: 100
          minimum: 1
          type: integer
      - description: ソート対象フィールド
        in: query
        name: sort
        schema:
          default: created_at
          enum:
          - created_at
          - views
          - file_name
          - duration
          type: string
      - description: ソート順序
        in: query
        name: order
        schema:
          default: desc
          enum:
          - asc
          - desc
          type: string
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/VideoListResponse"
          description: 成功
        "422":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/Error"
          description: バリデーションエラー
        "500":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/Error"
          description: サーバーエラー
      summary: ビデオ一覧を取得
      tags:
      - Videos
  /api/v1/videos/search:
    get:
      description: キーワードでビデオを検索します
      parameters:
      - description: 検索キーワード
        in: query
        name: q
        required: true
        schema:
          minLength: 1
          type: string
      - description: ページ番号
        in: query
        name: page
        schema:
          default: 1
          minimum: 1
          type: integer
      - description: 1ページあたりのアイテム数
        in: query
        name: limit
        schema:
          default: 20
          maximum: 100
          minimum: 1
          type: integer
      - description: ソート順序
        in: query
        name: order
        schema:
          default: desc
          enum:
          - asc
          - desc
          type: string
      - description: フィルター
        in: query
        name: filterBy
        schema:
          type: string
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/VideoListResponse"
          description: 成功
        "400":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/Error"
          description: リクエストエラー
        "500":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/Error"
          description: サーバーエラー
      summary: ビデオを検索
      tags:
      - Videos
  /api/v1/videos/{id}:
    get:
      description: 特定のビデオの詳細情報を取得します
      parameters:
      - description: ビデオID
        in: path
        name: id
        required: true
        schema:
          minimum: 1
          type: integer
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/VideoResponse"
          description: 成功
        "404":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/Error"
          description: ビデオが見つかりません
        "500":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/Error"
          description: サーバーエラー
      summary: ビデオ詳細を取得
      tags:
      - Videos
  /api/v1/videos/{id}/download:
    get:
      description: ビデオファイルをダウンロードします
      parameters:
      - description: ビデオID
        in: path
        name: id
        required: true
        schema:
          minimum: 1
          type: integer
      responses:
        "200":
          content:
            '*/*':
              schema:
                format: binary
                type: string
          description: 成功
        "404":
          content: {}
          description: ビデオが見つかりません
        "500":
          content: {}
          description: サーバーエラー
      summary: ビデオをダウンロード
      tags:
      - Videos
  /api/v1/videos/{id}/thumbnail/regenerate:
    post:
      description: ビデオのサムネイルを再生成します
      parameters:
      - description: ビデオID
        in: path
        name: id
        required: true
        schema:
          minimum: 1
          type: integer
      requestBody:
        content:
          '*/*':
            schema:
              $ref: "#/components/schemas/ThumbnailRegenerateRequest"
        required: false
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ThumbnailRegenerateResponse"
          description: 成功
        "404":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/Error"
          description: ビデオが見つかりません
        "500":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/Error"
          description: サーバーエラー
      summary: サムネイルを再生成
      tags:
      - Videos
      x-codegen-request-body-name: body
  /api/v1/captures:
    get:
      description: キャプチャ一覧をページネーション付きで取得します
      parameters:
      - description: ビデオID（フィルタリング用）
        in: query
        name: video_id
        schema:
          minimum: 1
          type: integer
      - description: ページ番号
        in: query
        name: page
        schema:
          default: 1
          minimum: 1
          type: integer
      - description: 1ページあたりのアイテム数
        in: query
        name: limit
        schema:
          default: 20
          maximum: 100
          minimum: 1
          type: integer
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CaptureListResponse"
          description: 成功
        "500":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/Error"
          description: サーバーエラー
      summary: キャプチャ一覧を取得
      tags:
      - Captures
    post:
      description: 新しいキャプチャを作成します
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/_api_v1_captures_post_request"
        required: true
      responses:
        "201":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/Capture"
          description: 作成成功
        "400":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/Error"
          description: リクエストエラー
        "404":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/Error"
          description: ビデオが見つかりません
        "500":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/Error"
          description: サーバーエラー
      summary: キャプチャを作成
      tags:
      - Captures
components:
  schemas:
    ApiComment:
      example:
        size: big
        color: color
        author: author
        time: 0.8008281904610115
        text: text
        type: right
      properties:
        time:
          description: コメント時刻（秒）
          type: number
        type:
          description: コメント表示位置
          enum:
          - right
          - top
          - bottom
          type: string
        size:
          description: コメントサイズ
          enum:
          - big
          - medium
          - small
          type: string
        color:
          description: コメント色
          type: string
        author:
          description: コメント作成者
          type: string
        text:
          description: コメント本文
          type: string
      required:
      - color
      - size
      - text
      - time
      - type
      type: object
    VideoResponse:
      example:
        comments:
        - size: big
          color: color
          author: author
          time: 0.8008281904610115
          text: text
          type: right
        - size: big
          color: color
          author: author
          time: 0.8008281904610115
          text: text
          type: right
        src: src
        description: description
        is_success: true
        title: title
      properties:
        is_success:
          description: リクエスト成功フラグ
          type: boolean
        src:
          description: ビデオソース（URL）
          type: string
        title:
          description: ビデオタイトル
          type: string
        description:
          description: ビデオ説明
          type: string
        comments:
          description: 弾幕コメント一覧
          items:
            $ref: "#/components/schemas/ApiComment"
          type: array
      required:
      - comments
      - is_success
      - src
      type: object
    Video:
      example:
        duration: 5.637376656633329
        updated_at: 2000-01-23T04:56:07.000+00:00
        jikkyo_comment_count: 1
        file_name: file_name
        thumbnail_info:
          generated_at: 2000-01-23T04:56:07.000+00:00
          width: 2
          height: 7
        jikkyo_date: 2000-01-23T04:56:07.000+00:00
        created_at: 2000-01-23T04:56:07.000+00:00
        id: 0
        file_size: 6
        views: 5
        liked: true
        status: ready
      properties:
        id:
          description: ビデオID
          type: integer
        file_name:
          description: ファイル名
          type: string
        status:
          description: ビデオステータス
          enum:
          - ready
          - processing
          - error
          type: string
        file_size:
          description: ファイルサイズ（バイト）
          type: integer
        jikkyo_comment_count:
          description: 実況コメント数
          type: integer
        jikkyo_date:
          description: 実況日時
          format: date-time
          type: string
        views:
          description: 閲覧数
          type: integer
        liked:
          description: お気に入りフラグ
          type: boolean
        duration:
          description: 動画長（秒）
          format: double
          type: number
        created_at:
          description: 作成日時
          format: date-time
          type: string
        updated_at:
          description: 更新日時
          format: date-time
          type: string
        thumbnail_info:
          $ref: "#/components/schemas/ThumbnailInfo"
      required:
      - created_at
      - duration
      - file_name
      - file_size
      - id
      - liked
      - updated_at
      - views
      type: object
    ThumbnailInfo:
      example:
        generated_at: 2000-01-23T04:56:07.000+00:00
        width: 2
        height: 7
      properties:
        width:
          description: サムネイル幅
          type: integer
        height:
          description: サムネイル高さ
          type: integer
        generated_at:
          description: 生成日時
          format: date-time
          type: string
      type: object
    VideoListResponse:
      example:
        pagination:
          total: 2
          limit: 3
          page: 9
          total_pages: 4
        data:
        - duration: 5.637376656633329
          updated_at: 2000-01-23T04:56:07.000+00:00
          jikkyo_comment_count: 1
          file_name: file_name
          thumbnail_info:
            generated_at: 2000-01-23T04:56:07.000+00:00
            width: 2
            height: 7
          jikkyo_date: 2000-01-23T04:56:07.000+00:00
          created_at: 2000-01-23T04:56:07.000+00:00
          id: 0
          file_size: 6
          views: 5
          liked: true
          status: ready
        - duration: 5.637376656633329
          updated_at: 2000-01-23T04:56:07.000+00:00
          jikkyo_comment_count: 1
          file_name: file_name
          thumbnail_info:
            generated_at: 2000-01-23T04:56:07.000+00:00
            width: 2
            height: 7
          jikkyo_date: 2000-01-23T04:56:07.000+00:00
          created_at: 2000-01-23T04:56:07.000+00:00
          id: 0
          file_size: 6
          views: 5
          liked: true
          status: ready
      properties:
        data:
          items:
            $ref: "#/components/schemas/Video"
          type: array
        pagination:
          $ref: "#/components/schemas/Pagination"
      required:
      - data
      - pagination
      type: object
    Capture:
      example:
        filename: filename
        created_at: 2000-01-23T04:56:07.000+00:00
        id: 0
        video_id: 6
      properties:
        id:
          description: キャプチャID
          type: integer
        filename:
          description: ファイル名
          type: string
        created_at:
          description: 作成日時
          format: date-time
          type: string
        video_id:
          description: ビデオID（外部キー）
          type: integer
      required:
      - created_at
      - filename
      - id
      - video_id
      type: object
    CaptureListResponse:
      example:
        pagination:
          total: 2
          limit: 3
          page: 9
          total_pages: 4
        data:
        - filename: filename
          created_at: 2000-01-23T04:56:07.000+00:00
          id: 0
          video_id: 6
        - filename: filename
          created_at: 2000-01-23T04:56:07.000+00:00
          id: 0
          video_id: 6
      properties:
        data:
          items:
            $ref: "#/components/schemas/Capture"
          type: array
        pagination:
          $ref: "#/components/schemas/Pagination"
      required:
      - data
      - pagination
      type: object
    ThumbnailRegenerateRequest:
      example:
        width: 1
        height: 1
        timestamp: 0.14658129805029452
      properties:
        width:
          description: サムネイル幅
          minimum: 1
          type: integer
        height:
          description: サムネイル高さ
          minimum: 1
          type: integer
        timestamp:
          description: 抽出タイムスタンプ（秒）
          minimum: 0
          type: number
      type: object
    ThumbnailRegenerateResponse:
      example:
        thumbnail_info:
          generated_at: 2000-01-23T04:56:07.000+00:00
          width: 2
          height: 7
        id: 0
        message: message
      properties:
        id:
          description: ビデオID
          type: integer
        thumbnail_info:
          $ref: "#/components/schemas/ThumbnailInfo"
        message:
          description: ステータスメッセージ
          type: string
      required:
      - id
      - message
      - thumbnail_info
      type: object
    Pagination:
      example:
        total: 2
        limit: 3
        page: 9
        total_pages: 4
      properties:
        page:
          description: 現在のページ番号
          type: integer
        limit:
          description: 1ページあたりのアイテム数
          type: integer
        total:
          description: 総アイテム数
          type: integer
        total_pages:
          description: 総ページ数
          type: integer
      required:
      - limit
      - page
      - total
      - total_pages
      type: object
    Error:
      example:
        code: code
        error: error
      properties:
        error:
          description: エラーメッセージ
          type: string
        code:
          description: エラーコード
          type: string
      required:
      - error
      type: object
    _api_v1_captures_post_request:
      properties:
        file:
          description: キャプチャファイル
          format: binary
          type: string
        video_id:
          description: ビデオID
          format: int32
          minimum: 1
          type: integer
      required:
      - file
      - video_id
      type: object
x-original-swagger-version: "2.0"
