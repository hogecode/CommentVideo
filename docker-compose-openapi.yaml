version: '3.9'

services:
  # Go Serverコード生成（go-chi用にカスタマイズ可能）
  openapi-go-server:
    image: openapitools/openapi-generator-cli:latest
    container_name: openapi-go-server
    volumes:
      - .:/local
    working_dir: /local
    command: generate -i /local/docs/swagger.yaml -g go-server -o /local/server/generated --skip-validate-spec --additional-properties=packageName=generated,hideGenerationTimestamp=true,serverPort=8000

  # React Query用 TypeScript Fetchクライアント生成
  openapi-typescript-react-query:
    image: openapitools/openapi-generator-cli:latest
    container_name: openapi-typescript-react-query
    volumes:
      - .:/local
    working_dir: /local
    command: generate -i /local/docs/swagger.yaml -g typescript-fetch -o /local/frontend/src/generated --additional-properties=typescriptThreePlus=true,supportsES6=true,hideGenerationTimestamp=true,modelPackage=models,apiPackage=api

  # レガシー互換性のため
  openapi-generator:
    image: openapitools/openapi-generator-cli
    container_name: openapi-generator
    volumes:
      - .:/local
    working_dir: /local
    entrypoint: ["java","-jar","/openapi-generator-cli.jar"]
    command: [
      "generate",
      "-i","/local/docs/swagger.yaml",
      "-g","go-gin-server",
      "-o","/local/server/generated",
      "--skip-validate-spec",
      "--additional-properties=packageName=generated,hideGenerationTimestamp=true,serverPort=8000"
    ]

  openapi-client:
    image: openapitools/openapi-generator-cli
    container_name: openapi-client
    volumes:
      - .:/local
    working_dir: /local
    entrypoint: ["java","-jar","/openapi-generator-cli.jar"]
    command: [
      "generate",
      "-i","/local/docs/swagger.yaml",
      "-g","typescript-fetch",
      "-o","/local/frontend/src/generated",
      "--additional-properties=typescriptThreePlus=true,supportsES6=true,hideGenerationTimestamp=true,modelPackage=models,apiPackage=api"
    ]
